<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐜 Ant Colony</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <canvas id="colony-canvas"></canvas>
        
        <div id="ui-overlay">
            <!-- Compact stats bar at top -->
            <div id="top-bar">
                <span id="stat-population">🐜 0</span>
                <span id="stat-food">🌰 0</span>
                <span id="day-count">Day 1</span>
            </div>
            
            <!-- Minimal controls at bottom -->
            <div id="controls">
                <button id="btn-pause" title="Space">⏸️</button>
                <button id="btn-speed" title="1-4">1×</button>
                <button id="btn-pheromones" class="active" title="P">👁️</button>
            </div>
        </div>
        
        <div id="tooltip" class="hidden"></div>
    </div>
    
    <script type="module" src="js/main.js"></script>
</body>
</html>
